name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  GOFLAGS: "-tags=modernc"
  CGO_ENABLED: "0"

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }} / ${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            goarch: amd64
            runner: ubuntu-latest
          - os: linux
            goarch: arm64
            runner: ubuntu-24.04-arm
          - os: darwin
            goarch: arm64
            runner: macos-latest
          - os: windows
            goarch: amd64
            runner: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: Verify module
        run: go mod verify

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.goarch }}
        run: go build ./...

      - name: Vet
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.goarch }}
        run: go vet ./...

      - name: Test
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.goarch }}
        run: go test -count=1 -race -timeout=5m ./...
