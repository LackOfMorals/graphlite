updated_at: 2026-05-19T00:00:00Z

tasks:
  - id: task-001
    title: "Project scaffold, go.mod, and CI configuration"
    description: |
      Initialise the Go module at the chosen import path (e.g. github.com/graphlite/graphlite),
      lay out the package structure matching the architecture diagram (driver, session, compat,
      parser, planner, translator, store packages), and wire up a GitHub Actions CI pipeline
      that builds and tests on Linux amd64/arm64, macOS arm64, and Windows amd64 in CGO-free
      mode. Add go.sum, .gitignore, and an initial README stub with the compatibility table.
    status: completed
    dependencies: []
    acceptance_criteria:
      - "go build ./... succeeds on all three target platforms in CGO-free mode (GOFLAGS=-tags=modernc)"
      - "GitHub Actions workflow runs on push and PR, covering linux/amd64, linux/arm64, darwin/arm64, windows/amd64"
      - "Package layout matches the architecture diagram: driver, session, compat, parser, planner, translator, store top-level packages"
      - "README exists with compatibility table stub and honest scope statement"
    completed_at: "2026-05-19T00:00:00Z"

  - id: task-002
    title: "Core domain types: Node, Relationship, Record, error types"
    description: |
      Define the canonical Go types used throughout the library: Node (ElementId, Labels, Props),
      Relationship (ElementId, Type, StartElementId, EndElementId, Props), Record (ordered key-value
      pairs), and the sentinel error types including ErrUnsupportedCypher (with clause/position
      detail, detectable via errors.As). These types are the currency between every layer and must
      be defined before any layer is implemented.
    status: completed
    dependencies:
      - task-001
    acceptance_criteria:
      - "Node type has ElementId string, Labels []string, Props map[string]any fields"
      - "Relationship type has ElementId, Type, StartElementId, EndElementId string, Props map[string]any fields"
      - "Record exposes Get(key string) (any, bool) and AsMap() map[string]any"
      - "ErrUnsupportedCypher is a named error type with Clause and Position fields, detectable via errors.As"
      - "All types are exported and have package-level doc comments"
    completed_at: "2026-05-19T10:00:00Z"

  - id: task-003
    title: "SQLite schema DDL and storage interface definition"
    description: |
      Define the store.Store interface (the abstraction boundary between the Cypher layer and
      persistence) and implement the DDL that creates the nodes and edges tables plus the four
      indexes described in the architecture. Enable WAL mode on open for concurrent-reader support.
      Both :memory: and file-path URIs must be handled.
    status: completed
    dependencies:
      - task-001
    acceptance_criteria:
      - "store.Store interface defines methods for node/edge CRUD and transaction management"
      - "Schema DDL creates nodes(id, labels, props) and edges(id, type, start_id, end_id, props) tables"
      - "All four indexes (idx_nodes_labels, idx_edges_start, idx_edges_end, idx_edges_type) are created on open"
      - "WAL mode is enabled via PRAGMA journal_mode=WAL on open"
      - ":memory: and file-path URIs both produce a functional store instance"
    completed_at: "2026-05-19T11:00:00Z"

  - id: task-004
    title: "SQLite storage implementation: node/edge CRUD and transactions"
    description: |
      Implement the store.Store interface against modernc.org/sqlite (CGO-free). Provide Insert,
      Get, Delete, and List operations for nodes and edges, plus Begin/Commit/Rollback transaction
      primitives. Property maps are stored as JSON columns; labels are stored as comma-separated
      text. This layer must never import Cypher types — it works only with raw IDs, label strings,
      JSON blobs, and SQL result rows.
    status: completed
    dependencies:
      - task-003
    acceptance_criteria:
      - "Node and edge insert operations return a stable integer ElementId"
      - "Label lookup uses idx_nodes_labels index (verified via EXPLAIN QUERY PLAN)"
      - "Transactions commit atomically; rollback reverts all mutations in the transaction"
      - "modernc.org/sqlite is the only SQLite dependency (no CGO, no mattn/go-sqlite3 required)"
      - "Unit tests cover insert, get, delete, list, and transaction rollback for both nodes and edges"
    completed_at: "2026-05-19T12:00:00Z"

  - id: task-005
    title: "Integrate cloudprivacylabs/opencypher parser and audit coverage"
    description: |
      Add cloudprivacylabs/opencypher as a dependency and write a thin parser package that wraps
      the library, exposing a single Parse(cypher string) (*ast.Query, error) function. Audit the
      parser against every feature in the v0.1 target list and document any gaps. If a required
      feature is unsupported or produces a wrong AST, file a note in the parser package and plan
      a fork or workaround before proceeding to the planner.
    status: completed
    dependencies:
      - task-001
    acceptance_criteria:
      - "cloudprivacylabs/opencypher is vendored or listed in go.mod at a pinned version"
      - "parser.Parse returns a typed AST for all v0.1 Cypher features (MATCH, WHERE, RETURN, CREATE, SET, DELETE)"
      - "Parser audit document (or inline comments) identifies any known gaps vs. the v0.1 feature list"
      - "Unit tests verify AST structure for at least 10 representative Cypher inputs"
      - "Multi-label MATCH (n:Person:Employee) semantics are verified to require both labels"
    completed_at: "2026-05-19T14:30:00Z"

  - id: task-006
    title: "Logical plan types and BindingScope tracker"
    description: |
      Define the LogicalPlan interface and its concrete node types (MatchNode, MatchRelationship,
      FilterPlan, ReturnPlan, CreateNodePlan, CreateRelPlan, SetPropPlan, DeletePlan, etc.). Implement
      BindingScope — the map from Cypher variable names to SQL table alias and column expression —
      and its merge/shadow semantics for WITH pipelines. The planner and translator are both
      consumers; BindingScope is the central shared data structure for query correctness.
    status: completed
    dependencies:
      - task-002
      - task-005
    acceptance_criteria:
      - "LogicalPlan is a sealed interface with a concrete type for each planned operation"
      - "BindingScope.Bind(varName, alias, column) and BindingScope.Resolve(varName) are the primary API"
      - "BindingScope handles shadowing correctly: a WITH clause creates a child scope; resolving in child first, then parent"
      - "Unit tests cover scope shadowing, multi-hop variable tracking, and WITH pipeline scoping"
      - "Plan types carry enough information for the translator to emit SQL without re-inspecting the AST"
    completed_at: "2026-05-19T15:30:00Z"

  - id: task-007
    title: "Planner: MATCH patterns (node, label, property, single-hop, multi-hop)"
    description: |
      Implement the planner pass that walks the parsed AST and emits LogicalPlan nodes for MATCH
      patterns. Cover: (n) all nodes, (n:Label) by label, (n:Label {prop: val}) by label+property,
      (a)-[r:TYPE]->(b) directed single-hop, (a)-[r:TYPE]-(b) undirected single-hop, and
      multi-hop chains up to 5 hops. Each hop adds a BindingScope entry for the relationship
      and target node variable.
    status: completed
    dependencies:
      - task-006
    acceptance_criteria:
      - "Planner emits correct LogicalPlan for all six MATCH pattern forms"
      - "BindingScope is populated with an entry for every named variable in the MATCH clause"
      - "Multi-hop chains of 2, 3, 4, and 5 hops produce the correct number of join plan nodes"
      - "Undirected hops emit a plan that checks both directions (start_id and end_id)"
      - "Unit tests assert the exact LogicalPlan tree for each pattern form"
    completed_at: "2026-05-19T16:30:00Z"

  - id: task-008
    title: "Planner: WHERE clause (comparisons, AND/OR/NOT, parameter references)"
    description: |
      Extend the planner to handle WHERE clauses: property comparisons (=, <>, <, >, <=, >=),
      boolean combinators (AND, OR, NOT), and $param references. The planner emits a FilterPlan
      node that carries a predicate expression tree. Parameter references are left as placeholders
      — the translator binds them to SQL ? markers with the correct parameter map.
    status: completed
    dependencies:
      - task-007
    acceptance_criteria:
      - "All six comparison operators produce correct FilterPlan predicate nodes"
      - "AND, OR, NOT combinators produce nested predicate trees with correct precedence"
      - "$param references in WHERE are represented as ParamRef nodes in the predicate tree"
      - "Unit tests cover all operator types, nested boolean logic, and parameter references"
      - "Invalid WHERE syntax returns a structured parse error, not a panic"
    completed_at: "2026-05-19T18:00:00Z"

  - id: task-009
    title: "Planner: RETURN projections, ORDER BY, LIMIT, SKIP"
    description: |
      Implement the planner pass for RETURN clauses: property projections (n.prop), node/relationship
      projections (n, r), AS aliasing, ORDER BY (ASC/DESC), LIMIT, and SKIP. The ReturnPlan node
      carries a projection list (each item is an expression + optional alias), an optional sort
      spec, and optional limit/skip values.
    status: completed
    dependencies:
      - task-007
    acceptance_criteria:
      - "Property projections (n.prop AS alias) produce correct ReturnPlan projection entries"
      - "Node and relationship projections (RETURN n) carry the full variable name for the translator"
      - "ORDER BY with ASC/DESC on multiple columns produces a correctly ordered sort spec"
      - "LIMIT and SKIP values are carried as integers in the ReturnPlan"
      - "Unit tests cover aliased projections, multi-column ORDER BY, and LIMIT/SKIP combinations"
    completed_at: "2026-05-19T18:30:00Z"

  - id: task-010
    title: "Planner: CREATE nodes and relationships"
    description: |
      Implement planner support for CREATE (n:Label {props}), CREATE (a)-[:TYPE {props}]->(b),
      and compound CREATE patterns that create multiple nodes and relationships in one statement.
      The planner emits a CreateNodePlan (labels, props map) and CreateRelPlan (type, start var,
      end var, props map). Props with $param values are carried as ParamRef nodes.
    status: completed
    dependencies:
      - task-006
    acceptance_criteria:
      - "CREATE node emits CreateNodePlan with labels list and property expression map"
      - "CREATE relationship emits CreateRelPlan linking named start and end node variables"
      - "Compound CREATE (multiple nodes + relationships in one statement) produces multiple plan nodes in correct order"
      - "$param references in property maps are represented as ParamRef nodes"
      - "Unit tests cover single-node, single-relationship, and compound CREATE patterns"
    completed_at: "2026-05-19T19:00:00Z"

  - id: task-011
    title: "Planner: SET property, DELETE, and DETACH DELETE"
    description: |
      Implement planner support for SET n.prop = value (and SET n.prop = $param), DELETE n
      (error-if-relationships variant), DETACH DELETE n, and DELETE r (relationship deletion).
      The planner emits SetPropPlan, DeleteNodePlan (detach bool), and DeleteRelPlan nodes.
      MATCH + SET and MATCH + DELETE compound statements must produce a plan with both a
      match subtree and a mutation root.
    status: completed
    dependencies:
      - task-007
    acceptance_criteria:
      - "SET n.prop = value and SET n.prop = $param produce correct SetPropPlan nodes"
      - "DELETE n emits DeleteNodePlan with detach=false; DETACH DELETE n emits detach=true"
      - "DELETE r emits a DeleteRelPlan"
      - "MATCH + DELETE compound plans correctly link the match subtree to the delete root"
      - "Unit tests cover SET with literal, SET with param, DELETE node, DETACH DELETE, and DELETE relationship"
    completed_at: "2026-05-19T20:00:00Z"

  - id: task-012
    title: "SQL Dialect interface and SQLite dialect implementation"
    description: |
      Define the translator.Dialect interface with methods for emitting SQL fragments: QuoteIdentifier,
      JSONExtract (for props->>'$.key' patterns), LabelContains (for comma-separated label lookup),
      and Placeholder (? vs $N). Implement SQLiteDialect as the sole concrete dialect at v1.0.
      This is the extension point for future DuckDB/Postgres backends.
    status: completed
    dependencies:
      - task-006
    acceptance_criteria:
      - "Dialect interface covers QuoteIdentifier, JSONExtract, LabelContains, and Placeholder methods"
      - "SQLiteDialect.JSONExtract emits json_extract(props, '$.key') syntax"
      - "SQLiteDialect.LabelContains emits an instr/like-based label check against the comma-separated labels column"
      - "SQLiteDialect.Placeholder always returns '?' (SQLite positional)"
      - "Unit tests verify each dialect method produces the expected SQL fragment"
    completed_at: "2026-05-19T21:00:00Z"

  - id: task-013
    title: "SQL Translator: MATCH/WHERE/RETURN read queries"
    description: |
      Implement the translator pass that walks a LogicalPlan tree (containing match, filter, and
      return nodes) and emits a parameterised SQL string plus an ordered []any argument slice.
      Single-node queries become SELECT from nodes; single-hop queries join nodes and edges; multi-hop
      queries chain multiple joins. The BindingScope drives the variable-to-column mapping.
    status: completed
    dependencies:
      - task-012
      - task-009
      - task-008
    acceptance_criteria:
      - "MATCH (n:Label) WHERE n.prop = $p RETURN n.name AS name produces correct SELECT with json_extract and label check"
      - "Single-hop MATCH (a)-[r:TYPE]->(b) produces a JOIN between nodes and edges tables"
      - "Multi-hop (3-hop) MATCH produces two chained JOINs with correct alias scoping"
      - "ORDER BY, LIMIT, and SKIP are appended correctly to the SQL output"
      - "Parameter values are placed in the correct position in the []any argument slice"
      - "Unit tests cover all pattern types and compare SQL output string against expected fixtures"
    completed_at: "2026-05-19T22:00:00Z"

  - id: task-014
    title: "SQL Translator: CREATE, SET, DELETE write operations"
    description: |
      Extend the translator to handle write operation plan nodes: CreateNodePlan emits INSERT INTO
      nodes, CreateRelPlan emits INSERT INTO edges (resolving start/end variable IDs from prior
      inserts or the BindingScope), SetPropPlan emits UPDATE nodes SET props = json_set(...),
      DeleteNodePlan emits DELETE FROM nodes (with a relationship-existence guard for non-detach),
      and DeleteRelPlan emits DELETE FROM edges.
    status: completed
    dependencies:
      - task-013
      - task-011
      - task-010
    acceptance_criteria:
      - "CREATE node emits INSERT INTO nodes (labels, props) VALUES (?, json(?))"
      - "CREATE relationship correctly resolves start/end node IDs and emits INSERT INTO edges"
      - "SET n.prop = val emits UPDATE nodes SET props = json_set(props, '$.prop', ?) WHERE id = ?"
      - "DELETE n (non-detach) emits an error if any edge references the node ID"
      - "DETACH DELETE n emits DELETE FROM edges WHERE start_id=? OR end_id=? followed by DELETE FROM nodes WHERE id=?"
      - "Unit tests verify SQL output for each write operation"
    completed_at: "2026-05-19T23:00:00Z"

  - id: task-015
    title: "Named query parameter binding ($param syntax)"
    description: |
      Implement end-to-end named parameter binding: the planner identifies $paramName references
      in WHERE predicates and property maps, the translator maps them to positional ? placeholders
      in the correct order, and the execution layer looks up values from the caller-supplied
      map[string]any. Missing parameters must return a structured error, not a nil deref.
    status: completed
    dependencies:
      - task-014
    acceptance_criteria:
      - "MATCH (n:Person {name: $name}) WHERE n.age > $minAge with map{name: Alice, minAge: 30} produces correct parameterised SQL"
      - "Parameter order in the []any slice matches the positional ? order in the SQL string"
      - "A missing parameter key returns ErrMissingParameter with the parameter name"
      - "Parameters work in WHERE predicates, CREATE property maps, and SET value positions"
      - "Unit and integration tests cover multi-parameter queries and error cases"
    completed_at: "2026-05-19T23:30:00Z"

  - id: task-016
    title: "Native API: graphlite.Open, query execution, and transaction primitives"
    description: |
      Implement the public native API: graphlite.Open(path string) (*DB, error), db.Close(ctx),
      db.RunQuery(ctx, cypher string, params map[string]any) (Result, error) for auto-commit mode,
      db.BeginTx(ctx, readOnly bool) (Tx, error), tx.Run(ctx, cypher, params), tx.Commit(ctx),
      and tx.Rollback(ctx). This layer orchestrates parse → plan → translate → execute → map results.
    status: completed
    dependencies:
      - task-015
      - task-004
      - task-017
    acceptance_criteria:
      - "graphlite.Open(\":memory:\") returns a usable *DB without error"
      - "graphlite.Open(\"./test.db\") creates the file and returns a usable *DB"
      - "db.RunQuery executes a full MATCH query and returns populated Record values"
      - "Explicit transactions commit and rollback correctly, with rollback reverting all mutations"
      - "db.Close releases all SQLite resources; subsequent calls on closed DB return errors"
    completed_at: "2026-05-19T25:00:00Z"

  - id: task-017
    title: "Result types: lazy iteration, Record, Node, Relationship, ResultSummary"
    description: |
      Implement the Result type for lazy streaming (result.Next(ctx), result.Record(), result.Err())
      and the EagerResult type for pre-collected results (Records []neo4j.Record, Summary). Map raw
      SQLite rows to Record, Node, and Relationship values matching the neo4j-go-driver/v6 type
      signatures exactly. ResultSummary.Counters() must return node/relationship created/deleted
      counts from the write operation.
    status: completed
    dependencies:
      - task-002
      - task-004
    acceptance_criteria:
      - "result.Next(ctx) / result.Record() / result.Err() provide correct lazy iteration semantics"
      - "record.Get(\"key\") returns (any, bool) matching the v6 interface"
      - "record.AsMap() returns map[string]any with all projected columns"
      - "Node results have Props map[string]any, Labels []string, ElementId string"
      - "Relationship results have Props, Type, StartElementId, EndElementId string"
      - "ResultSummary.Counters() returns accurate created/deleted counts after write operations"
    completed_at: "2026-05-19T24:00:00Z"

  - id: task-018
    title: "DriverCompat: implement neo4j.Driver interface"
    description: |
      Implement the DriverCompat struct that satisfies the neo4j.Driver interface from
      github.com/neo4j/neo4j-go-driver/v6/neo4j. graphlite.NewDriver(uri, auth) is the
      constructor. Auth config is accepted and silently ignored. DatabaseName in SessionConfig
      is accepted and ignored. The URI \":memory:\" opens an in-memory store; a file path opens
      a persistent store. A compile-time interface assertion must guard against v6 drift.
    status: pending
    dependencies:
      - task-016
      - task-017
    acceptance_criteria:
      - "var _ neo4j.Driver = (*DriverCompat)(nil) compile-time assertion is present"
      - "graphlite.NewDriver(\":memory:\", nil) returns a value assignable to neo4j.Driver"
      - "neo4j.BasicAuth and neo4j.NoAuth are accepted without error and ignored"
      - "SessionConfig.DatabaseName is accepted and ignored without error"
      - "driver.Close(ctx) releases all resources cleanly"
    completed_at: null

  - id: task-019
    title: "DriverCompat: all three transaction tiers (ExecuteQuery, managed, explicit)"
    description: |
      Implement all three v6 transaction tiers on the DriverCompat adapter. Tier 1:
      neo4j.ExecuteQuery() with EagerResultTransformer contract. Tier 2: session.ExecuteRead()
      and session.ExecuteWrite() with neo4j.ManagedTransaction callback signatures (no retry
      required, but callback must be honoured). Tier 3: session.BeginTransaction() with
      explicit Commit() / Rollback().
    status: pending
    dependencies:
      - task-018
    acceptance_criteria:
      - "neo4j.ExecuteQuery(ctx, driver, cypher, params, neo4j.EagerResultTransformer) works end-to-end"
      - "session.ExecuteRead with a ManagedTransaction callback reads data and returns the callback result"
      - "session.ExecuteWrite with a ManagedTransaction callback writes data and commits on success"
      - "session.BeginTransaction returns an explicit transaction; Commit persists; Rollback reverts"
      - "Integration tests use the DriverCompat API exclusively, running all v0.1 Cypher features through it"
    completed_at: null

  - id: task-020
    title: "JSON bulk import (atomic, rollback on error)"
    description: |
      Implement graphlite.Import(ctx, r io.Reader, format graphlite.FormatJSON) that reads the
      JSON format {\"nodes\": [...], \"edges\": [...]} and inserts all nodes and edges in a single
      transaction. Each node carries labels []string and props map[string]any; each edge carries
      type string, startId, endId (referencing the node array index or a stable ID field), and
      props. On any parse or constraint error the entire import is rolled back.
    status: pending
    dependencies:
      - task-016
    acceptance_criteria:
      - "A valid JSON import file inserts all nodes and edges atomically"
      - "An invalid JSON structure (missing fields, wrong types) returns a structured error and rolls back all inserts"
      - "A referential integrity error (edge references non-existent node) rolls back the entire import"
      - "JSON depth and size limits (protection against JSON bombs) are enforced during parsing"
      - "Integration test imports a 1000-node, 2000-edge graph and verifies counts via MATCH queries"
    completed_at: null

  - id: task-021
    title: "Unit test suite for all four layers (parser, planner, translator, store)"
    description: |
      Write dedicated unit test files for each package: parser tests assert AST structure,
      planner tests assert LogicalPlan tree shape given a known AST, translator tests assert
      SQL string and parameter slice given a known LogicalPlan, and store tests assert CRUD
      behaviour against an in-memory SQLite instance. Each test is independent and does not
      require a running database server.
    status: pending
    dependencies:
      - task-014
      - task-004
    acceptance_criteria:
      - "go test ./... passes with no failures on all four packages"
      - "Planner tests use table-driven format covering all v0.1 MATCH, WHERE, RETURN, CREATE, SET, DELETE patterns"
      - "Translator tests compare SQL output against golden fixture strings"
      - "Store tests cover insert, get, delete, list, and transaction rollback"
      - "Test coverage for parser, planner, and translator packages is at least 80%"
    completed_at: null

  - id: task-022
    title: "Integration test harness with end-to-end Cypher fixture tests"
    description: |
      Build the integration test harness in testdata/: each test is a .cypher setup file plus
      a .cypher query file plus an expected-result JSON. The harness runs setup queries, executes
      the query against an in-memory graphlite instance, and diffs the result against the expected
      JSON. Cover every feature in the v0.1 compatibility table with at least one fixture test.
    status: pending
    dependencies:
      - task-019
      - task-020
    acceptance_criteria:
      - "Integration test harness is runnable via go test ./testdata/... (or equivalent)"
      - "At least one fixture test exists for each v0.1 feature row in the compatibility table"
      - "Tests run entirely in-memory with no network calls or Docker containers"
      - "Test failures report the differing Cypher query, expected result, and actual result"
      - "All integration tests pass on the first complete v0.1 implementation"
    completed_at: null

  - id: task-023
    title: "v0.2: OPTIONAL MATCH (left-join semantics)"
    description: |
      Add OPTIONAL MATCH support to the planner and translator. OPTIONAL MATCH produces a LEFT
      JOIN in SQL rather than an INNER JOIN, meaning unmatched rows return null values for the
      optional pattern's variables. The BindingScope must mark variables introduced by OPTIONAL
      MATCH as nullable so downstream RETURN and WHERE clauses handle nulls correctly.
    status: pending
    dependencies:
      - task-022
    acceptance_criteria:
      - "OPTIONAL MATCH emits a LEFT JOIN in the generated SQL"
      - "Variables from the optional pattern are null for rows where the pattern does not match"
      - "RETURN after OPTIONAL MATCH correctly projects null values for unmatched optional variables"
      - "WHERE n.prop IS NOT NULL after OPTIONAL MATCH filters correctly"
      - "Integration tests verify optional-match semantics against known datasets"
    completed_at: null

  - id: task-024
    title: "v0.2: WITH pipelines and aggregation (count, sum, avg, min, max)"
    description: |
      Implement WITH clause support, enabling multi-stage query pipelines where the output of one
      MATCH+RETURN stage becomes the input of the next. Add aggregation functions count(), sum(),
      avg(), min(), max() usable in WITH and RETURN contexts. The translator must emit SQL
      subqueries or CTEs for WITH stages and GROUP BY for aggregations.
    status: pending
    dependencies:
      - task-023
    acceptance_criteria:
      - "MATCH ... WITH n, count(r) AS cnt RETURN n.name, cnt produces correct grouped results"
      - "WITH correctly scopes variables: only variables projected through WITH are visible downstream"
      - "count(), sum(), avg(), min(), max() all produce correct SQL aggregate functions"
      - "Aggregation with GROUP BY is emitted when aggregation functions are mixed with non-aggregate projections"
      - "Integration tests cover each aggregation function with known expected outputs"
    completed_at: null

  - id: task-025
    title: "v0.2: COLLECT(), DISTINCT, and advanced WHERE predicates"
    description: |
      Implement COLLECT() aggregate (emits JSON_GROUP_ARRAY in SQLite), DISTINCT in RETURN and
      aggregation context (emits SELECT DISTINCT or COUNT(DISTINCT ...)), and the remaining
      advanced WHERE predicates: exists(n.prop), n.prop IS NULL / IS NOT NULL, n.prop IN [...],
      n.prop STARTS WITH / ENDS WITH / CONTAINS string predicates.
    status: pending
    dependencies:
      - task-024
    acceptance_criteria:
      - "COLLECT(n.name) emits json_group_array(json_extract(n.props, '$.name')) and returns a JSON array"
      - "RETURN DISTINCT n.prop emits SELECT DISTINCT and deduplicates results"
      - "WHERE exists(n.prop) emits json_extract(props, '$.prop') IS NOT NULL"
      - "WHERE n.prop IN ['a','b','c'] emits json_extract(props, '$.prop') IN ('a','b','c')"
      - "STARTS WITH / ENDS WITH / CONTAINS emit correct LIKE patterns"
    completed_at: null

  - id: task-026
    title: "v0.2: REMOVE property/label and SET n += {map} property merge"
    description: |
      Add REMOVE n.prop (emits json_remove on the props column), REMOVE n:Label (removes one
      label from the comma-separated labels column), and SET n += {map} which merges a property
      map into the existing props JSON without overwriting unmentioned keys (emits json_patch or
      a json_set loop).
    status: pending
    dependencies:
      - task-025
    acceptance_criteria:
      - "REMOVE n.prop deletes the key from the JSON props column without affecting other properties"
      - "REMOVE n:Label removes the label from the labels column while preserving remaining labels"
      - "SET n += {a: 1, b: 2} merges keys into existing props without removing pre-existing keys"
      - "Integration tests verify REMOVE and SET += round-trip correctly via subsequent MATCH queries"
      - "Unit tests cover the SQL emitted for each REMOVE and SET += variant"
    completed_at: null

  - id: task-027
    title: "v0.2: CSV bulk import/export and JSON bulk export"
    description: |
      Add CSV import support using the Neo4j-compatible header format (separate node and edge
      CSV files, with :ID, :LABEL, :START_ID, :END_ID, :TYPE headers). Add bulk export for
