      `SELECT` round-trips executed per edge row to validate start and end node existence.
      Rely on the `PRAGMA foreign_keys = ON` constraint (from task-002) to reject dangling edges
      natively. Map the resulting SQLite `FOREIGN KEY constraint failed` error to the appropriate
      graphlite error type with a clear error message.
    status: pending
    dependencies: [task-002, task-015]
    acceptance_criteria:
      - 'CSV edge import no longer executes `GetNode` calls per edge row'
      - 'Importing an edge with a non-existent node ID still fails with a clear, correctly-typed error'
