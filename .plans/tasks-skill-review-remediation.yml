tasks:
  - id: task-001
    title: 'Define Labels type with Encode/Decode helpers'
    description: |
      Define `type Labels []string` in `types.go` (or a new `labels.go`) along with
      `func (l Labels) Encode() string` (comma-separated) and `func DecodeLabels(s string) Labels`
      (splits on comma, returns nil/empty for empty input). Update `NodeRow.Labels` from `string`
      to `Labels` and update the `Store` interface parameters accordingly. Update all internal
      callers (`insertNode`, `getNode`, `listNodesByLabel`, `importer.go`, `result.go`) to use
      `Labels.Encode()` / `DecodeLabels()` rather than raw comma manipulation. The underlying
      SQLite storage format (comma-separated text) does not change in this task.
    status: completed
    dependencies: []
    acceptance_criteria:
      - 'No call site in non-store code directly constructs or parses a comma-separated label string'
      - 'The public `Node.Labels` field is of type `Labels` (or consistent `[]string`)'
      - 'JSON export uses `"labels": ["Person","Employee"]` rather than `"labels": "Person,Employee"`'
      - '`go test ./...` passes with no regressions after the change'
    completed_at: '2026-05-27T00:00:00Z'

  - id: task-002
    title: 'Enforce PRAGMA foreign_keys = ON at open time'
    description: |
      Add `PRAGMA foreign_keys = ON;` to the `Open` function in `store/sqlite.go` after the
      `PRAGMA journal_mode=WAL` line and before schema DDL application. Return an error if the
      PRAGMA execution fails. Audit `store/crud_test.go` for any tests that assume unconstrained
      edge insertion (synthetic node IDs not pre-inserted) and fix them before or alongside this
      change so the test suite continues to pass.
    status: completed
    dependencies: []
    acceptance_criteria:
      - 'Inserting an edge whose `start_id` does not exist in `nodes` returns a `FOREIGN KEY constraint failed` error'
      - 'Inserting an edge whose `end_id` does not exist in `nodes` returns a `FOREIGN KEY constraint failed` error'
      - '`go test ./...` passes after fixing any test that previously relied on unconstrained edge insertion'
      - 'The `Open` function returns an error if `PRAGMA foreign_keys = ON` fails to execute'
    completed_at: '2026-05-27T00:00:00Z'

  - id: task-003
    title: 'Refactor sqliteTx: collapse 14-method override duplication'
    description: |
      Refactor `store/sqlite.go` so that `SQLiteStore` holds a single `querier` field (the
      interface is already defined at line 288) set to `*sql.DB` at `Open` time and to `*sql.Tx`
      at `Begin` time. Remove the `sqliteTx` struct and its 14 per-method forwarding overrides —
      `Begin` should return a `*SQLiteStore` with the `querier` set to the transaction. Review all
      `SQLiteStore.DB()` callers before removing the field. This is prerequisite infrastructure
      for the junction table work in task-008.
    status: completed
    dependencies: [task-002]
    acceptance_criteria:
      - '`store/sqlite.go` no longer contains a `sqliteTx` struct'
      - 'No per-method forwarding overrides remain for `sqliteTx`'
      - 'All existing `store/crud_test.go` and `store/store_test.go` tests pass'
      - '`go vet ./...` and `golangci-lint run` produce no new findings'
    completed_at: '2026-05-27T00:00:00Z'

  - id: task-004
    title: 'Fix RawExpr SQL injection: return error instead of interpolating verbatim'
    description: |
      In `sql/translator.go` lines 1617–1620, replace the `case *cypher.RawExpr` branch that
      returns `e.Text` directly into the generated SQL with a `return "", fmt.Errorf(...)` call.
      If future callers need best-effort passthrough for trusted internal use, gate it behind an
      explicit allowlist validated with the `isIdentifier` function from `cypher/planner.go`.
      This closes the highest-severity SQL injection vector identified in the security review.
    status: completed
    dependencies: []
    acceptance_criteria:
      - 'No path through `exprToSQL` returns unvalidated user-supplied text into the SQL string'
      - 'A Cypher expression that triggers `*cypher.RawExpr` returns a descriptive error'
      - 'Existing query tests that do not use `RawExpr` continue to pass'
      - '`go test ./...` passes'
    completed_at: '2026-05-27T00:00:00Z'

  - id: task-005
    title: 'Validate property key names before JSON path construction'
    description: |
      At all sites in `sql/translator.go` (approximately lines 649, 723, 742) that build
      `$.key` JSON path strings, validate the property key using the `isIdentifier` function
      already present in `cypher/planner.go` before concatenating it into the fragment. Return
      a descriptive error if validation fails. Document which characters are rejected and why
      in a comment. This prevents malformed JSON path injection via bracket characters or null
      bytes in property key names.
    status: completed
    dependencies: [task-004]
    acceptance_criteria:
      - 'A property key containing `]` causes `exprToSQL` to return an error'
      - 'A property key containing `[` causes `exprToSQL` to return an error'
      - 'A property key containing a null byte causes `exprToSQL` to return an error'
      - 'Valid property key names continue to produce correct JSON path fragments'
      - '`go test ./...` passes'
    completed_at: '2026-05-27T00:00:00Z'

  - id: task-006
    title: 'Apply hard cap to user-supplied MaxHops in variable-length path translation'
    description: |
      In `sql/translator.go` around line 868, extend the `safetyLimit = 15` cap (currently
      applied only for unbounded `[*]` paths) to also clamp explicit `MaxHops` values. Clamp
      the value and log a warning, or return an error when `MaxHops > safetyLimit`. Expose a
      `WithMaxPathHops(n int)` option on `DB` in `options.go` so callers can deliberately raise
      the cap with documented risk.
    status: completed
    dependencies: []
    acceptance_criteria:
      - 'A Cypher query `MATCH p=(a)-[*1..1000]->(b) RETURN p` on an unmodified `DB` is rejected or clamped to 15 hops'
      - '`WithMaxPathHops(50)` allows queries up to 50 hops'
      - 'The `WithMaxPathHops` option is documented with a risk warning'
      - '`go test ./...` passes'
    completed_at: null

  - id: task-007
    title: 'Enforce read-only contract in BeginTx and fix misleading PRAGMA comment'
    description: |
      In `driver.go` `BeginTx` function (lines 150–160), add a `d.readOnly` check that returns
      `ErrReadOnly` before opening a transaction, or issue `PRAGMA query_only=ON` immediately
      after `Open` when `WithReadOnly` is set to enforce read-only at the SQLite engine level.
      Remove or correct the misleading PRAGMA mention in the `WithReadOnly` doc comment that
      references a PRAGMA that was never executed.
    status: completed
    dependencies: []
    acceptance_criteria:
      - 'Opening a DB with `WithReadOnly()` then calling `db.BeginTx(ctx)` followed by a write returns an error'
      - 'The error is consistent with the `ErrReadOnly` contract documented on the type'
      - 'The `WithReadOnly` doc comment no longer references an unenforced PRAGMA'
      - '`go test ./...` passes'
    completed_at: '2026-05-27T00:00:00Z'

  - id: task-008
