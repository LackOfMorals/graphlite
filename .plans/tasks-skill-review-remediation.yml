  - id: task-009
    title: 'Escape LIKE wildcards in LabelContains for % and _ in label names'
    description: |
      In `sql/dialect.go` `LabelContains` function (lines 147–154), escape `%` as `\%` and `_`
      as `\_` in `labelName` before binding it in all four LIKE branches, and append
      `ESCAPE '\'` to each LIKE predicate. Use the same escaping already present in
      `stringMatchPattern` (approximately lines 1715–1718 of `sql/translator.go`). Update the
      `LabelContains` function signature comment to document this escaping behaviour.
    status: completed
    dependencies: []
    acceptance_criteria:
      - 'A node with label `"50%_off"` is NOT matched by `MATCH (n:Person)`'
      - 'A node with label `"50%_off"` IS matched by an exact label query for that label'
      - 'Label names without wildcards continue to produce correct results'
      - '`go test ./...` passes'
    completed_at: null

  - id: task-010
    title: 'Implement full openCypher escape sequences in unquoteString'
    description: |
      Extend `cypher/parser.go` `unquoteString` function (lines 1607–1623) to handle the
      complete openCypher escape sequence table: `\n` → newline, `\r` → carriage return,
      `\t` → tab, `\b` → backspace, `\f` → form feed, and `\uXXXX` → Unicode code point.
      Unrecognised backslash sequences should return an error (or optionally pass through with
      a comment explaining the forward-compatibility choice). Currently only five sequences are
      handled and unrecognised ones silently pass through as literal backslashes.
    status: pending
    dependencies: []
    acceptance_criteria:
      - "The Cypher literal `'Hello\\nWorld'` produces a Go string containing a real newline character"
      - "The Cypher literal `'\\t'` produces a Go string containing a real tab character"
      - "The Cypher literal `'\\u0041'` produces the Go string `\"A\"`"
      - 'Unrecognised backslash sequences return an error or are documented as pass-through'
      - '`go test ./...` passes'
    completed_at: null

  - id: task-011
    title: 'Upgrade stale ANTLR and opencypher dependencies; add govulncheck to CI'
    description: |
      Run `go get` to upgrade `github.com/antlr/antlr4/runtime/Go/antlr` and
