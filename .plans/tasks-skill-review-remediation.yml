    status: pending
    dependencies: []
    acceptance_criteria:
      - '`go.mod` pins both dependencies to versions released in 2024 or later'
      - 'All `antlr` imports in `cypher/` use the correct updated module path'
      - '`govulncheck ./...` reports no known vulnerabilities'
      - '`go test ./...` passes after the upgrade'
      - 'CI pipeline includes a `govulncheck` step'
    completed_at: null

  - id: task-012
    title: 'Make Rollback idempotent (no-op after Commit)'
    description: |
      In `tx.go` `Rollback` function (lines 45–53), change the `if t.done` branch to return
      `nil` instead of an error, following the `database/sql.Tx` convention. Add a comment
      explaining that this matches the standard Go convention where `Rollback` after `Commit` is
      a no-op. This fix unblocks the defer-based rollback pattern required by task-013 and
      task-014.
    status: pending
    dependencies: []
    acceptance_criteria:
      - 'Calling `tx.Rollback()` after `tx.Commit()` returns `nil` without error'
      - 'Calling `tx.Rollback()` before `tx.Commit()` still performs the rollback'
      - 'A comment explains the `database/sql` convention rationale'
      - '`go test ./...` passes'
    completed_at: null

  - id: task-013
    title: 'Use defer-based transaction rollback in importer.go'
    description: |
      Refactor `importJSON`, `importCSVNodes`, and `importCSVEdges` in `importer.go` to use
      the standard Go defer+named-return pattern for rollback. Add a deferred closure that calls
      `tx.Rollback()` only when `retErr != nil`, and remove all inline `_ = tx.Rollback()` calls
      from the function bodies. This requires task-012 to be complete first so that the deferred
      rollback after a successful commit is a no-op.
    status: pending
    dependencies: [task-012]
    acceptance_criteria:
      - '`grep -n ''tx.Rollback'' importer.go` returns zero results outside of the deferred closures'
      - 'All three import functions use the named-return defer pattern'
      - 'Import error paths still correctly roll back the transaction'
      - '`go test ./...` passes'
    completed_at: null

  - id: task-014
    title: 'Respect context cancellation in Result.Next'
    description: |
      In `result.go` `Next` function (line 65), add a context check at the top of the function
      that returns `false` and sets `r.err = ctx.Err()` and `r.consumed = true` when the context
      is already cancelled or has timed out. The existing body remains unchanged after this guard.
      This fixes the false API contract where callers pass cancellable contexts expecting
      iteration to stop.
    status: pending
    dependencies: []
    acceptance_criteria:
      - 'A test that cancels the context mid-iteration sees `Next` return `false`'
      - '`result.Err()` returns `context.Canceled` after the context is cancelled'
      - 'Iteration completes normally when the context is not cancelled'
      - '`go test ./...` passes'
    completed_at: null

