      `importMaxDepth`.
    status: pending
    dependencies: [task-015]
    acceptance_criteria:
      - '`BenchmarkImportJSON` on a 1,000-node payload shows reduced CPU time consistent with eliminating two of three parse passes'
      - '`ErrImportDepthExceeded` is still returned when depth exceeds `importMaxDepth`'
      - 'All existing JSON import tests pass'
      - '`go test ./...` passes'
    completed_at: null

  - id: task-020
    title: 'Reduce per-row heap allocations in result.go and streaming result paths'
    description: |
      In `result.go` `Next` function, pre-allocate `rawVals`, `ptrs`, and `vals` on the
      `Result` struct during construction (sized to `len(r.keys)`) and reuse them across `Next`
      calls instead of allocating per call. In `driver.go` `collectMatchRows`, pre-allocate
      `ptrs` once before the row loop and reuse by resetting (not reallocating) per row. These
      changes reduce GC pressure at high query rates.
    status: pending
    dependencies: [task-015]
    acceptance_criteria:
      - 'Allocation count per `Next` call in `BenchmarkCollectLargeResult` decreases by at least 3 allocations per row vs. pre-fix baseline'
      - '`go test -race ./...` passes (no data races from slice reuse)'
      - 'Query results are identical to pre-fix behaviour'
      - '`go test ./...` passes'
    completed_at: null
