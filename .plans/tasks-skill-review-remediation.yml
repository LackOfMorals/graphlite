  - id: task-016
    title: 'Add query plan cache to avoid redundant ANTLR parses'
    description: |
      In `driver.go` `buildSQLResult` function, add a plan cache (a `sync.Map` or bounded LRU
      capped at 1,024 entries, keyed on the Cypher string) that stores the translated
      `glsql.Result` minus bound parameter values. On a cache hit, skip parse/plan/translate and
      call only `BindParams` with the current parameter values. On a cache miss, run the full
      pipeline and store the result. Verify that the `glsql.Result` struct is safe to share
      across goroutines (read-only after construction).
    status: pending
    dependencies: [task-015]
    acceptance_criteria:
      - '`BenchmarkBuildSQLResult_CacheHit` demonstrates cache hits at least 5× faster than cache misses for a simple `MATCH (n) RETURN n` query'
      - 'Concurrent cache reads are safe (verified by `go test -race ./...`)'
      - 'Cache hits produce identical query results to cache misses'
      - '`go test ./...` passes'
    completed_at: null

  - id: task-017
    title: 'Replace LIKE-based label lookup with a node_labels junction table'
    description: |
      Add a `node_labels(node_id INTEGER NOT NULL REFERENCES nodes(id), label TEXT NOT NULL)`
      junction table to `store/schema.go` with index `CREATE INDEX idx_node_labels_label ON
      node_labels(label, node_id)`. Populate rows in `insertNode`, maintain them in a new
      `updateNodeLabels` helper, and delete them in `deleteNode`. Update `listNodesByLabel` to
      JOIN against `node_labels`. Update the SQL translator's label predicate generation to use
      a subquery or JOIN rather than `LabelContains`. Add an `Open`-time backfill migration for
      existing databases. This task depends on task-003 (sqliteTx refactor) for clean
      transaction handling and task-002 (foreign keys) for the `REFERENCES` constraint to work.
    status: pending
    dependencies: [task-003, task-015, task-009]
    acceptance_criteria:
      - '`EXPLAIN QUERY PLAN` for `MATCH (n:Person) RETURN n` on a multi-label dataset shows an index scan on `node_labels`, not a full scan on `nodes`'
      - '`BenchmarkMatchByLabel` on a 10,000-node graph shows no full table scan'
      - 'Existing databases are backfilled correctly on first `Open` after upgrade'
      - '`go test ./...` passes including junction table correctness tests'
    completed_at: null

  - id: task-018
    title: 'Remove redundant GetNode lookups on CSV edge import'
