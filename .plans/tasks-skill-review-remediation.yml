      - '`go test ./...` passes with no regression in import correctness'
    completed_at: null

  - id: task-019
    title: 'Eliminate triple JSON parse pass in importJSON'
    description: |
      In `importer.go` `decodeImportJSON` function, merge the three-pass approach
